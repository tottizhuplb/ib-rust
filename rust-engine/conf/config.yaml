# rust-engine 入口配置（启动时加载，唯一配置来源）
# IB host 固定为 Docker Compose 服务名 ib-gateway；端口由 .env 的 TRADING_MODE 决定
#
# 目录约定（均在 conf/ 下）：
#   config.yaml          基础设施 + 外部文件路径（本文件）
#   <domain>/            各域业务配置（路径在 paths 段声明）
#     market/            行情采集
#     strategy/          （预留）
#     risk/              （预留）

ib:
  client_id: 101

storage:
  data_dir: ./data          # WAL 根目录；market 落盘于 ./data/market
  segment_max_bytes: 268435456
  wal_rotation: hourly      # hourly | size

pipeline:
  event_channel_capacity: 50000
  flush_interval_ms: 500
  snapshot_interval_secs: 60
  reconnect_backoff_secs: 1

logging:
  log_dir: ./logs
  level: info
  rotation: daily   # daily | hourly

paths:
  subscriptions: market/subscriptions.yaml
