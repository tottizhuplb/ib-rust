# rust-engine 静态配置（启动时加载）
# 环境变量可覆盖 ib / storage / pipeline 字段；subscriptions 目前仅来自此文件
#
# CONFIG_PATH=./config.yaml cargo run

ib:
  host: ib-gateway
  client_id: 101

storage:
  data_dir: ./data
  segment_max_bytes: 268435456

pipeline:
  event_channel_capacity: 50000
  snapshot_channel_capacity: 1000
  flush_interval_ms: 500
  snapshot_interval_secs: 30
  reconnect_backoff_secs: 1

# desired subscriptions — session ready 后由 Subscription Manager reconcile
subscriptions:
  - symbol: "00700"
    exchange: SEHK
    currency: HKD
    sec_type: STK
    mode: depth
    levels: 10

  - symbol: "09988"
    exchange: SEHK
    currency: HKD
    sec_type: STK
    mode: top
