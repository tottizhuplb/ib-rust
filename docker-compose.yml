# =============================================================================
# ib-rust Docker Compose
#
# 启动方式：
#   仅 Gateway：  docker compose up ib-gateway
#   开发模式：    docker compose --profile dev up --build
#   生产模式：    docker compose --profile prod up -d --build
#
# 说明：不带 profile 的 `docker compose up` 只会启动 ib-gateway，
#       collector 需通过 dev / prod profile 显式选择。
# =============================================================================

# rust-collector 公共配置（prod / dev 共用，通过 YAML anchor 继承）
# 配置与 ib-gateway 共用 .env（见 .env.example）
x-rust-collector-base: &rust-collector-base
  depends_on:
    ib-gateway:
      condition: service_healthy # 等 Gateway API 端口就绪后再启动 collector
  env_file:
    - .env
  working_dir: /app
  networks:
    - ib-net

services:
  # ---------------------------------------------------------------------------
  # IB Gateway（gnzsnz/ib-gateway-docker）
  # https://github.com/gnzsnz/ib-gateway-docker
  # 账号配置见项目根目录 .env（从 .env.example 复制）
  #
  # 端口说明（socat 转发）：
  #   宿主机 4001/4002 ↔ 容器 4003/4004 ↔ 内部 TWS 127.0.0.1:4001/4002
  #   容器网络内 collector 连 ib-gateway:4004（paper）或 :4003（live）
  # ---------------------------------------------------------------------------
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: ib-gateway
    restart: unless-stopped
    env_file:
      - .env                      # 全部 Gateway 配置见 .env.example
    volumes:
      # 宿主机 ./ib-gateway/tws_settings ↔ 容器 ${TWS_SETTINGS_PATH}（必须在 .env 中配置）
      - ./ib-gateway/tws_settings:${TWS_SETTINGS_PATH}
    ports:
      - "127.0.0.1:4001:4003"  # 实盘 API（socat → 容器 4003）
      - "127.0.0.1:4002:4004"  # 模拟盘 API（socat → 容器 4004）
      - "127.0.0.1:5900:5900"  # VNC（需在 .env 配置 VNC_SERVER_PASSWORD）
    healthcheck:
      # gnzsnz 通过 socat 暴露 API；paper 检查 4004，live 检查 4003
      test:
        [
          "CMD-SHELL",
          "if [ \"$$TRADING_MODE\" = live ]; then port=4003; else port=4004; fi; bash -c \"</dev/tcp/127.0.0.1/$$port\" || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 120s        # 首次启动含登录，预留较长等待时间
    networks:
      - ib-net

  # ---------------------------------------------------------------------------
  # 生产 collector：release 二进制打入镜像，不挂载源码
  # ---------------------------------------------------------------------------
  rust-collector:
    <<: *rust-collector-base
    profiles: ["prod"]
    build:
      context: ./rust-collector
      dockerfile: Dockerfile   # 多阶段构建 → debian-slim + ./collector
    container_name: rust-collector
    restart: unless-stopped
    command: ["./collector"]

  # ---------------------------------------------------------------------------
  # 开发 collector：挂载本地源码，cargo-watch 改代码自动重编译
  # ---------------------------------------------------------------------------
  rust-collector-dev:
    <<: *rust-collector-base
    profiles: ["dev"]
    build:
      context: ./rust-collector
      dockerfile: Dockerfile.dev # rust 工具链 + cargo-watch
    container_name: rust-collector-dev
    volumes:
      - ./rust-collector:/app                              # 源码 bind mount，本地改代码容器内可见
      - rust-collector-cargo-registry:/usr/local/cargo/registry # 依赖缓存（加速编译，避免写回 macOS 本地盘）
      - rust-collector-cargo-git:/usr/local/cargo/git
      - rust-collector-target:/app/target                  # 编译产物缓存（同上，仅 dev 使用）

# 容器间通信网络（ib-gateway ↔ rust-collector）
networks:
  ib-net:
    driver: bridge

# dev 模式编译缓存卷（显式声明；删除此块 Compose 也会自动创建同名 volume）
volumes:
  rust-collector-cargo-registry:
  rust-collector-cargo-git:
  rust-collector-target:
