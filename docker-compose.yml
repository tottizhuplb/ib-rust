# =============================================================================
# ib-rust Docker Compose
#
# 启动方式：
#   仅 Gateway：  docker compose up ib-gateway
#   开发模式：    docker compose --profile dev up -d --build rust-engine-dev
#                 docker exec -it rust-engine-dev bash
#   生产模式：    docker compose --profile prod up -d --build rust-engine
#
# 说明：不带 profile 的 `docker compose up` 只会启动 ib-gateway，
#       engine 需通过 dev / prod profile 显式选择。
# =============================================================================

# rust-engine 公共配置（prod / dev 共用，通过 YAML anchor 继承）
# 配置与 ib-gateway 共用 .env（见 .env.example）
x-rust-engine-base: &rust-engine-base
  depends_on:
    ib-gateway:
      condition: service_healthy # 等 Gateway API 端口就绪后再启动 engine
  env_file:
    - .env
  working_dir: /app
  networks:
    - ib-net

services:
  # ---------------------------------------------------------------------------
  # IB Gateway（gnzsnz/ib-gateway-docker）
  # https://github.com/gnzsnz/ib-gateway-docker
  # 账号配置见项目根目录 .env（从 .env.example 复制）
  #
  # 端口说明（socat 转发）：
  #   宿主机 4001/4002 ↔ 容器 4003/4004 ↔ 内部 TWS 127.0.0.1:4001/4002
  #   容器网络内 engine 连 ib-gateway:4004（paper）或 :4003（live）
  # ---------------------------------------------------------------------------
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: ib-gateway
    restart: unless-stopped
    env_file:
      - .env                      # 全部 Gateway 配置见 .env.example
    volumes:
      # 宿主机 ./ib-gateway/tws_settings ↔ 容器 ${TWS_SETTINGS_PATH}（必须在 .env 中配置）
      - ./ib-gateway/tws_settings:${TWS_SETTINGS_PATH}
    ports:
      - "127.0.0.1:4001:4003"  # 实盘 API（socat → 容器 4003）
      - "127.0.0.1:4002:4004"  # 模拟盘 API（socat → 容器 4004）
      - "127.0.0.1:5900:5900"  # VNC（需在 .env 配置 VNC_SERVER_PASSWORD）
    healthcheck:
      # gnzsnz 通过 socat 暴露 API；paper 检查 4004，live 检查 4003
      test:
        [
          "CMD-SHELL",
          "if [ \"$$TRADING_MODE\" = live ]; then port=4003; else port=4004; fi; bash -c \"</dev/tcp/127.0.0.1/$$port\" || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 120s        # 首次启动含登录，预留较长等待时间
    networks:
      - ib-net

  # ---------------------------------------------------------------------------
  # 生产 engine：release 二进制打入镜像，不挂载源码
  # ---------------------------------------------------------------------------
  rust-engine:
    <<: *rust-engine-base
    profiles: ["prod"]
    build:
      context: ./rust-engine
      dockerfile: Dockerfile   # 多阶段构建 → debian-slim + ./engine
    container_name: rust-engine
    restart: unless-stopped
    command: ["./engine"]
    volumes:
      - ./data:/app/data        # 行情落盘（conf/config.yaml storage.data_dir）
      - ./logs:/app/logs        # 应用日志（conf/config.yaml logging.log_dir）

  # ---------------------------------------------------------------------------
  # Rust 开发容器：挂载源码，进入容器内手动 cargo build / run / test
  #   docker compose --profile dev up -d --build rust-engine-dev
  #   docker exec -it rust-engine-dev bash
  # ---------------------------------------------------------------------------
  rust-engine-dev:
    <<: *rust-engine-base
    profiles: ["dev"]
    build:
      context: ./rust-engine
      dockerfile: Dockerfile.dev
    container_name: rust-engine-dev
    stdin_open: true
    tty: true
    volumes:
      - ./rust-engine:/app
      - ./data:/app/data        # 与 prod 共用宿主机 data/（覆盖 /app 下的 data 子目录）
      - ./logs:/app/logs        # 与 prod 共用宿主机 logs/
      - rust-engine-cargo-registry:/usr/local/cargo/registry
      - rust-engine-cargo-git:/usr/local/cargo/git
      - rust-engine-target:/app/target

# 容器间通信网络（ib-gateway ↔ rust-engine）
networks:
  ib-net:
    driver: bridge

# dev 模式编译缓存卷（显式声明；删除此块 Compose 也会自动创建同名 volume）
volumes:
  rust-engine-cargo-registry:
  rust-engine-cargo-git:
  rust-engine-target:
